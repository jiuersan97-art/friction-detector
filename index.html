<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>摩擦社区</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--fg:#f1f5f9;--fg2:#94a3b8;--fg3:#64748b;--accent:#818cf8;--accent2:#6366f1;--green:#4ade80;--red:#f87171;--orange:#fb923c;--radius:12px;--radius-sm:8px}
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
      .app{max-width:480px;margin:0 auto;padding:0;min-height:100vh;display:flex;flex-direction:column}
      .page{flex:1;padding:16px;padding-bottom:72px}

      /* Bottom Nav */
      .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;z-index:10}
      .nav-item{flex:1;padding:10px;text-align:center;cursor:pointer;color:var(--fg3);font-size:12px;transition:color .2s}
      .nav-item.active{color:var(--accent)}
      .nav-icon{font-size:20px;margin-bottom:2px}

      /* Search */
      .search{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:10px 14px;color:var(--fg);font-size:14px;width:100%;outline:none;font-family:inherit;margin-bottom:12px}
      .search:focus{border-color:var(--accent)}
      .search::placeholder{color:var(--fg3)}

      /* Tabs */
      .tabs{display:flex;gap:8px;margin-bottom:16px}
      .tab{padding:6px 14px;border-radius:20px;font-size:13px;color:var(--fg3);cursor:pointer;border:1px solid var(--bg3);background:transparent;font-family:inherit;transition:all .2s}
      .tab.active{background:var(--accent);border-color:var(--accent);color:white}

      /* Cards */
      .card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:background .2s}
      .card:hover{background:var(--bg3)}
      .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
      .card-title{font-size:15px;font-weight:600;color:var(--fg)}
      .card-desc{font-size:13px;color:var(--fg3);margin-bottom:8px;line-height:1.5}
      .card-meta{font-size:12px;color:var(--fg3);display:flex;gap:12px;align-items:center}
      .join-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:4px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
      .join-btn:hover{background:var(--accent);color:white}
      .join-btn.joined{background:var(--bg3);border-color:var(--bg3);color:var(--fg3)}

      /* Post */
      .post-card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px}
      .post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
      .post-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--fg3)}
      .post-author{font-size:13px;color:var(--fg2)}
      .post-time{font-size:11px;color:var(--fg3)}
      .post-type{font-size:11px;padding:2px 8px;border-radius:10px;margin-left:auto}
      .post-type.question{background:rgba(251,146,60,0.15);color:var(--orange)}
      .post-type.solution{background:rgba(74,222,128,0.15);color:var(--green)}
      .post-title{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--fg)}
      .post-content{font-size:13px;color:var(--fg2);line-height:1.6;margin-bottom:10px}
      .post-actions{display:flex;gap:16px;align-items:center}
      .post-action{font-size:12px;color:var(--fg3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .2s}
      .post-action:hover{color:var(--accent)}
      .post-action.voted{color:var(--accent)}

      /* Reply */
      .reply-card{background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;border-left:3px solid var(--bg3)}

      /* FAB */
      .fab{position:fixed;bottom:80px;right:calc(50% - 210px);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,0.4);z-index:10;transition:transform .2s}
      .fab:hover{transform:scale(1.05)}

      /* Modal */
      .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:20;display:flex;align-items:flex-end;justify-content:center}
      .modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;max-height:80vh;overflow-y:auto}
      .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .modal-title{font-size:16px;font-weight:600}
      .modal-close{font-size:20px;color:var(--fg3);cursor:pointer;background:none;border:none}
      .modal textarea{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;color:var(--fg);font-size:14px;width:100%;min-height:100px;resize:none;outline:none;font-family:inherit;margin-bottom:12px}
      .modal textarea:focus{border-color:var(--accent)}
      .modal input{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius);padding:10px 14px;color:var(--fg);font-size:14px;width:100%;outline:none;font-family:inherit;margin-bottom:12px}
      .type-toggle{display:flex;gap:8px;margin-bottom:16px}
      .type-opt{flex:1;padding:10px;border-radius:var(--radius);text-align:center;cursor:pointer;border:1px solid var(--bg3);font-size:13px;color:var(--fg3);font-family:inherit;background:transparent;transition:all .2s}
      .type-opt.active-q{border-color:var(--orange);color:var(--orange);background:rgba(251,146,60,0.08)}
      .type-opt.active-s{border-color:var(--green);color:var(--green);background:rgba(74,222,128,0.08)}

      .btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;border:none;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:opacity .2s}
      .btn-primary:hover{opacity:.9}
      .btn-primary:disabled{opacity:.4;cursor:default}

      .empty{text-align:center;padding:40px 16px;color:var(--fg3);font-size:14px}
      .empty-icon{font-size:32px;margin-bottom:8px}
      .loading{text-align:center;padding:40px;color:var(--fg3)}
      .back{font-size:14px;color:var(--fg3);cursor:pointer;margin-bottom:12px;display:inline-block}
      .back:hover{color:var(--accent)}
      .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .header-title{font-size:18px;font-weight:600}
      @keyframes spin{to{transform:rotate(360deg)}}
      .spinner{width:14px;height:14px;border:2px solid rgba(129,140,248,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    </style>
  </head>
  <body>
    <div id="app" class="app"><div class="loading">加载中...</div></div>

    <script>
    (function(){
      const API='https://fast-escargot-5192.youware.pro';
      const TAG_ICONS={time:'⏰',money:'💸',tool:'🔧',habit:'🔄',general:'💬'};
      let token=localStorage.getItem('fc_token');
      let email=localStorage.getItem('fc_email');
      let currentPage='community';
      let currentGroup=null;
      let currentPost=null;

      async function api(path,opts={}){
        const h={'Content-Type':'application/json'};
        if(token)h['Authorization']='Bearer '+token;
        try{
          const r=await fetch(API+path,{...opts,headers:{...h,...opts.headers}});
          return r.json();
        }catch(e){
          // If in iframe and fetch fails, suggest new tab
          if(window.self!==window.top&&!document.getElementById('iframe-warn')){
            const w=document.createElement('div');
            w.id='iframe-warn';
            w.style.cssText='background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--orange);text-align:center';
            w.innerHTML='⚠️ 在 iframe 中网络受限，<a href="'+window.location.href+'" target="_blank" style="color:var(--accent);text-decoration:underline">在新窗口打开</a> 获得完整体验';
            document.getElementById('app').prepend(w);
          }
          return {ok:false,error:'network error'};
        }
      }

      // ─── Router ────────────────────────────────────
      function navigate(page,opts={}){
        currentPage=page;
        if(opts.group)currentGroup=opts.group;
        if(opts.post)currentPost=opts.post;
        render();
      }

      function render(){
        const app=document.getElementById('app');
        if(!token){renderAuth(app);return;}
        const iframeBanner=(window.self!==window.top)?'<div style="background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#fb923c;text-align:center">⚠️ iframe 中功能受限，<a href="'+window.location.href+'" target="_blank" style="color:#818cf8;text-decoration:underline;cursor:pointer">在新窗口打开</a></div>':'';
        if(currentPage==='community')renderGroupList(app,iframeBanner);
        else if(currentPage==='group')renderGroupDetail(app,iframeBanner);
        else if(currentPage==='post')renderPostDetail(app,iframeBanner);
        else if(currentPage==='profile')renderProfile(app,iframeBanner);
      }

      // ─── Auth ──────────────────────────────────────
      function renderAuth(app){
        let isLogin=true;
        function draw(){
          app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:16px;gap:20px">
            <div style="font-size:22px;font-weight:700">🔍 摩擦社区</div>
            <div style="font-size:13px;color:var(--fg2)">发现别人的摩擦，分享你的解法</div>
            <form id="auth-f" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px">
              <input type="email" id="a-email" placeholder="邮箱" required style="background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;color:var(--fg);font-size:14px;width:100%;outline:none;font-family:inherit">
              <input type="password" id="a-pwd" placeholder="密码 (至少6位)" required minlength="6" style="background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;color:var(--fg);font-size:14px;width:100%;outline:none;font-family:inherit">
              <button class="btn-primary" type="submit">${isLogin?'登录':'注册'}</button>
            </form>
            <div style="font-size:12px;color:var(--fg3);cursor:pointer" id="a-toggle">${isLogin?'没有账号？注册':'已有账号？登录'}</div>
            <div id="a-msg" style="font-size:12px;color:var(--red)"></div>
          </div>`;
          document.getElementById('auth-f').onsubmit=async e=>{
            e.preventDefault();
            const em=document.getElementById('a-email').value.trim().toLowerCase();
            const pw=document.getElementById('a-pwd').value;
            const ep=isLogin?'/api/public/login':'/api/public/signup';
            try{
              const d=await api(ep,{method:'POST',body:JSON.stringify({email:em,password:pw})});
              if(d.ok){token=d.token;email=em;localStorage.setItem('fc_token',token);localStorage.setItem('fc_email',email);render();}
              else{document.getElementById('a-msg').textContent=d.error||'失败';}
            }catch(e){document.getElementById('a-msg').textContent='网络错误';}
          };
          document.getElementById('a-toggle').onclick=()=>{isLogin=!isLogin;draw();};
        }
        draw();
      }

      // ─── Group List ────────────────────────────────
      async function renderGroupList(app,banner=''){
        app.innerHTML='<div class="page"><div class="loading"><span class="spinner"></span> 加载中...</div>'+navHTML()+'</div>';
        const [groupsRes, membershipMap]=await Promise.all([
          api('/api/public/groups'),
          loadMembership()
        ]);
        const groups=groupsRes.ok?groupsRes.groups:[];
        app.innerHTML=`<div class="page">
          ${banner}
          <div class="header-title" style="margin-bottom:12px">🔍 摩擦社区</div>
          <input class="search" id="g-search" placeholder="搜索圈子...">
          <div id="g-list">${groups.map(g=>`
            <div class="card" data-gid="${g.id}">
              <div class="card-header">
                <div><div class="card-title">${g.icon||'💬'} ${esc(g.name)}</div></div>
                <button class="join-btn ${membershipMap[g.id]?'joined':''}" data-gid="${g.id}">${membershipMap[g.id]?'已加入 ✓':'+ 加入'}</button>
              </div>
              <div class="card-desc">${esc(g.description||'')}</div>
              <div class="card-meta"><span>👥 ${g.memberCount}人</span></div>
            </div>
          `).join('')}</div>
          ${navHTML()}
        </div>`;
        // Search filter
        document.getElementById('g-search').oninput=e=>{
          const q=e.target.value.toLowerCase();
          document.querySelectorAll('#g-list .card').forEach(c=>{
            c.style.display=c.textContent.toLowerCase().includes(q)?'':'none';
          });
        };
        // Card click → group detail
        document.querySelectorAll('#g-list .card').forEach(c=>{
          c.onclick=e=>{
            if(e.target.closest('.join-btn'))return;
            const gid=c.dataset.gid;
            const g=groups.find(x=>x.id===gid);
            navigate('group',{group:g});
          };
        });
        // Join/leave
        document.querySelectorAll('.join-btn').forEach(btn=>{
          btn.onclick=async e=>{
            e.stopPropagation();
            const gid=btn.dataset.gid;
            const d=await api(`/api/public/groups/${gid}/join`,{method:'POST'});
            if(d.ok){
              btn.classList.toggle('joined');
              btn.textContent=d.joined?'已加入 ✓':'+ 加入';
              const mc=btn.closest('.card').querySelector('.card-meta span');
              if(mc)mc.textContent=`👥 ${d.memberCount}人`;
            }
          };
        });
      }

      async function loadMembership(){
        const map={};
        const d=await api('/api/public/users/me/groups');
        if(d.ok)d.groups.forEach(g=>{map[g.id]=true;});
        return map;
      }

      // ─── Group Detail ──────────────────────────────
      async function renderGroupDetail(app,banner=''){
        if(!currentGroup){navigate('community');return;}
        const g=currentGroup;
        app.innerHTML=`<div class="page"><div class="loading"><span class="spinner"></span> 加载中...</div></div>`;
        const [postsRes, membRes]=await Promise.all([
          api(`/api/public/groups/${g.id}/posts`),
          api(`/api/public/groups/${g.id}/membership`)
        ]);
        const posts=postsRes.ok?postsRes.posts:[];
        const isMember=membRes.ok?membRes.joined:false;

        app.innerHTML=`<div class="page">
          ${banner}
          <div class="back" id="back-btn">← 返回</div>
          <div class="header-row">
            <div class="header-title">${g.icon||'💬'} ${esc(g.name)}</div>
            <div style="font-size:12px;color:var(--fg3)">👥 ${g.memberCount}人</div>
          </div>
          ${posts.length===0?'<div class="empty"><div class="empty-icon">💭</div>还没有人发帖，做第一个？</div>':''}
          ${posts.map(p=>`
            <div class="post-card" data-pid="${p.id}">
              <div class="post-header">
                <div class="post-avatar">👤</div>
                <div class="post-author">${esc(p.userId.slice(0,8))}</div>
                <div class="post-time">${timeAgo(p.createdAt)}</div>
                <span class="post-type ${p.postType||'question'}">${p.postType==='solution'?'✓ 方案':'? 问题'}</span>
              </div>
              <div class="post-title">${esc(p.title)}</div>
              <div class="post-content">${esc(p.content).slice(0,120)}${p.content.length>120?'...':''}</div>
              <div class="post-actions">
                <span class="post-action" data-pid="${p.id}" data-type="up">👍 ${p.upvotes}</span>
                <span class="post-action" data-pid="${p.id}" data-type="reply">💬 ${p.replyCount}</span>
              </div>
            </div>
          `).join('')}
          ${isMember?'<button class="fab" id="fab-post">+</button>':''}
          ${navHTML()}
        </div>`;

        document.getElementById('back-btn').onclick=()=>navigate('community');
        // Post click → post detail
        document.querySelectorAll('.post-card').forEach(c=>{
          c.onclick=e=>{
            if(e.target.closest('.post-action'))return;
            const pid=c.dataset.pid;
            const p=posts.find(x=>x.id===pid);
            navigate('post',{post:p,group:g});
          };
        });
        // Upvote
        document.querySelectorAll('.post-action[data-type="up"]').forEach(btn=>{
          btn.onclick=async e=>{
            e.stopPropagation();
            if(!token)return;
            const d=await api(`/api/public/posts/${btn.dataset.pid}/vote`,{method:'POST',body:JSON.stringify({type:'up'})});
            if(d.ok){btn.innerHTML=`👍 ${d.upvotes}`;btn.classList.toggle('voted',d.myVote==='up');}
          };
        });
        // FAB
        const fab=document.getElementById('fab-post');
        if(fab)fab.onclick=()=>showCreatePost(g);
      }

      // ─── Create Post ───────────────────────────────
      function showCreatePost(group){
        let postType='question';
        const overlay=document.createElement('div');
        overlay.className='modal-overlay';
        overlay.innerHTML=`<div class="modal">
          <div class="modal-header">
            <div class="modal-title">发帖到「${esc(group.name)}」</div>
            <button class="modal-close" id="m-close">✕</button>
          </div>
          <input id="m-title" placeholder="标题（一句话概括）" maxlength="60">
          <textarea id="m-content" placeholder="在这里描述你的困扰或分享你的解决方案..."></textarea>
          <div class="type-toggle">
            <button class="type-opt active-q" id="t-q">❓ 问题</button>
            <button class="type-opt" id="t-s">✅ 方案</button>
          </div>
          <button class="btn-primary" id="m-submit" disabled>发布</button>
        </div>`;
        document.body.appendChild(overlay);

        const checkInputs=()=>{
          const t=document.getElementById('m-title').value.trim();
          const c=document.getElementById('m-content').value.trim();
          document.getElementById('m-submit').disabled=!(t&&c);
        };
        document.getElementById('m-title').oninput=checkInputs;
        document.getElementById('m-content').oninput=checkInputs;

        document.getElementById('t-q').onclick=()=>{postType='question';document.getElementById('t-q').className='type-opt active-q';document.getElementById('t-s').className='type-opt';};
        document.getElementById('t-s').onclick=()=>{postType='solution';document.getElementById('t-s').className='type-opt active-s';document.getElementById('t-q').className='type-opt';};

        document.getElementById('m-close').onclick=()=>overlay.remove();
        overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

        document.getElementById('m-submit').onclick=async()=>{
          const btn=document.getElementById('m-submit');
          btn.disabled=true;btn.textContent='发布中...';
          const d=await api(`/api/public/groups/${group.id}/posts`,{
            method:'POST',body:JSON.stringify({
              title:document.getElementById('m-title').value.trim(),
              content:document.getElementById('m-content').value.trim(),
              postType
            })
          });
          if(d.ok){overlay.remove();navigate('group',{group});}
          else{btn.disabled=false;btn.textContent='发布';alert(d.error||'发布失败');}
        };
      }

      // ─── Post Detail ───────────────────────────────
      async function renderPostDetail(app,banner=''){
        if(!currentPost){navigate('community');return;}
        const p=currentPost;
        app.innerHTML='<div class="page"><div class="loading"><span class="spinner"></span> 加载中...</div></div>';
        const res=await api(`/api/public/posts/${p.id}`);
        if(!res.ok){navigate('group',{group:currentGroup});return;}
        const post=res.post;
        const postReplies=res.replies||[];

        app.innerHTML=`<div class="page">
          ${banner}
          <div class="back" id="back-btn">← ${currentGroup?esc(currentGroup.name):'返回'}</div>
          <div class="post-card" style="margin-bottom:16px">
            <div class="post-header">
              <div class="post-avatar">👤</div>
              <div class="post-author">${esc(post.userId.slice(0,8))}</div>
              <div class="post-time">${timeAgo(post.createdAt)}</div>
              <span class="post-type ${post.postType||'question'}">${post.postType==='solution'?'✓ 方案':'? 问题'}</span>
            </div>
            <div class="post-title" style="font-size:17px">${esc(post.title)}</div>
            <div class="post-content" style="font-size:14px">${esc(post.content)}</div>
            <div class="post-actions">
              <span class="post-action" id="vote-up">👍 ${post.upvotes}</span>
              <span class="post-action">💬 ${post.replyCount}</span>
            </div>
          </div>
          <div style="font-size:13px;color:var(--fg3);margin-bottom:10px">💬 ${postReplies.length} 条回复</div>
          ${postReplies.map(r=>`
            <div class="reply-card">
              <div class="post-header" style="margin-bottom:4px">
                <div class="post-avatar" style="width:22px;height:22px;font-size:10px">👤</div>
                <div class="post-author" style="font-size:12px">${esc(r.userId.slice(0,8))}</div>
                <div class="post-time">${timeAgo(r.createdAt)}</div>
              </div>
              <div style="font-size:13px;color:var(--fg);line-height:1.6">${esc(r.content)}</div>
            </div>
          `).join('')}
          <div style="margin-top:16px;display:flex;gap:8px">
            <input id="reply-input" placeholder="写回复..." style="flex:1;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:10px 14px;color:var(--fg);font-size:13px;outline:none;font-family:inherit">
            <button class="btn-primary" id="reply-btn" style="width:auto;padding:10px 16px;font-size:13px" disabled>发送</button>
          </div>
        </div>`;

        document.getElementById('back-btn').onclick=()=>navigate('group',{group:currentGroup});
        // Vote
        document.getElementById('vote-up').onclick=async()=>{
          if(!token)return;
          const d=await api(`/api/public/posts/${post.id}/vote`,{method:'POST',body:JSON.stringify({type:'up'})});
          if(d.ok)document.getElementById('vote-up').innerHTML=`👍 ${d.upvotes}`;
        };
        // Reply
        const replyInput=document.getElementById('reply-input');
        const replyBtn=document.getElementById('reply-btn');
        replyInput.oninput=()=>{replyBtn.disabled=!replyInput.value.trim();};
        replyBtn.onclick=async()=>{
          const content=replyInput.value.trim();
          if(!content)return;
          replyBtn.disabled=true;replyBtn.textContent='发送中...';
          const d=await api(`/api/public/posts/${post.id}/reply`,{method:'POST',body:JSON.stringify({content})});
          if(d.ok){replyInput.value='';navigate('post',{post:p,group:currentGroup});}
          else{replyBtn.disabled=false;replyBtn.textContent='发送';}
        };
      }

      // ─── Profile ───────────────────────────────────
      async function renderProfile(app,banner=''){
        app.innerHTML='<div class="page"><div class="loading"><span class="spinner"></span> 加载中...</div></div>';
        const [groupsRes, postsRes]=await Promise.all([
          api('/api/public/users/me/groups'),
          api('/api/public/users/me/posts')
        ]);
        const myGroups=groupsRes.ok?groupsRes.groups:[];
        const myPosts=postsRes.ok?postsRes.posts:[];
        let tab='groups';

        function draw(){
          app.innerHTML=`<div class="page">
            ${banner}
            <div style="text-align:center;margin-bottom:20px">
              <div style="width:56px;height:56px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px">👤</div>
              <div style="font-size:16px;font-weight:600">${esc(email||'')}</div>
              <div style="font-size:12px;color:var(--fg3);margin-top:4px">加入 ${myGroups.length} 个圈子 · ${myPosts.length} 帖子</div>
            </div>
            <div class="tabs" style="justify-content:center">
              <button class="tab ${tab==='groups'?'active':''}" id="t-groups">我加入的</button>
              <button class="tab ${tab==='posts'?'active':''}" id="t-posts">我的帖子</button>
            </div>
            <div id="p-content">
              ${tab==='groups'?myGroups.map(g=>`
                <div class="card" data-gid="${g.id}">
                  <div class="card-title">${g.icon||'💬'} ${esc(g.name)}</div>
                  <div class="card-meta" style="margin-top:6px"><span>👥 ${g.memberCount}人</span></div>
                </div>
              `).join(''):myPosts.map(p=>`
                <div class="post-card" data-pid="${p.id}">
                  <div class="post-content" style="margin-bottom:4px">📝 "${esc(p.title)}"</div>
                  <div class="card-meta"><span class="post-type ${p.postType||'question'}" style="font-size:10px">${p.postType==='solution'?'✓方案':'?问题'}</span><span>👍 ${p.upvotes} 💬 ${p.replyCount}</span></div>
                </div>
              `).join('')}
              ${(tab==='groups'?myGroups:myPosts).length===0?'<div class="empty">还没有内容</div>':''}
            </div>
            ${navHTML()}
          </div>`;

          document.getElementById('t-groups').onclick=()=>{tab='groups';draw();};
          document.getElementById('t-posts').onclick=()=>{tab='posts';draw();};
          // Group click
          document.querySelectorAll('#p-content .card[data-gid]').forEach(c=>{
            c.onclick=()=>{const g=myGroups.find(x=>x.id===c.dataset.gid);if(g)navigate('group',{group:g});};
          });
        }
        draw();
      }

      // ─── Bottom Nav ────────────────────────────────
      function navHTML(){
        return `<div class="bottom-nav">
          <div class="nav-item ${currentPage==='community'||currentPage==='group'||currentPage==='post'?'active':''}" data-page="community"><div class="nav-icon">🏠</div>社区</div>
          <div class="nav-item ${currentPage==='profile'?'active':''}" data-page="profile"><div class="nav-icon">👤</div>我的</div>
        </div>`;
      }

      // ─── Helpers ───────────────────────────────────
      function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
      function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'刚刚';if(d<3600000)return Math.floor(d/60000)+'分钟前';if(d<86400000)return Math.floor(d/3600000)+'小时前';return Math.floor(d/86400000)+'天前';}

      // ─── Init ──────────────────────────────────────
      render();
      // Bottom nav delegation
      document.addEventListener('click',e=>{
        const nav=e.target.closest('.nav-item');
        if(nav)navigate(nav.dataset.page);
      });
    })();
    </script>
  </body>
</html>
