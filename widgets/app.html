<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>生活摩擦探测器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
        --fg: #f1f5f9; --fg2: #94a3b8; --fg3: #64748b;
        --accent: #818cf8; --accent2: #6366f1;
        --green: #4ade80; --red: #f87171;
        --radius: 12px; --radius-sm: 8px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; }
      .app { max-width: 480px; margin: 0 auto; padding: 16px; }

      .auth { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; }
      .auth-title { font-size: 24px; font-weight: 700; text-align: center; }
      .auth-sub { font-size: 14px; color: var(--fg2); text-align: center; }
      .auth-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
      .auth-toggle { font-size: 13px; color: var(--fg3); text-align: center; cursor: pointer; }
      .auth-toggle:hover { color: var(--accent); }

      input[type="email"], input[type="password"], input[type="text"] {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
        padding: 12px 16px; color: var(--fg); font-size: 15px; width: 100%; outline: none;
        transition: border-color 0.2s; font-family: inherit;
      }
      input:focus { border-color: var(--accent); }
      input::placeholder { color: var(--fg3); }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: white; border: none; border-radius: var(--radius);
        padding: 12px 24px; font-size: 15px; font-weight: 600;
        cursor: pointer; width: 100%; font-family: inherit; transition: opacity 0.2s;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-primary:disabled { opacity: 0.5; cursor: default; }

      .entry-text {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
        padding: 14px 16px; color: var(--fg); font-size: 15px; width: 100%; outline: none;
        resize: none; min-height: 60px; font-family: inherit; transition: border-color 0.2s;
      }
      .entry-text:focus { border-color: var(--accent); }
      .entry-text::placeholder { color: var(--fg3); }
      .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .tag-btn {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: 20px;
        padding: 6px 14px; font-size: 13px; color: var(--fg2); cursor: pointer;
        transition: all 0.2s; font-family: inherit;
      }
      .tag-btn:hover { border-color: var(--accent); color: var(--fg); }
      .tag-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

      .stats { display: flex; gap: 12px; margin-bottom: 16px; }
      .stat-card { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 14px; text-align: center; }
      .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
      .stat-label { font-size: 12px; color: var(--fg3); margin-top: 4px; }

      .section { margin-bottom: 20px; }
      .section-title { font-size: 14px; font-weight: 600; color: var(--fg2); margin-bottom: 10px; }

      .entry-list { display: flex; flex-direction: column; gap: 8px; }
      .entry-item {
        background: var(--bg2); border-radius: var(--radius-sm);
        padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
      }
      .entry-tag {
        font-size: 11px; background: rgba(129,140,248,0.15); color: var(--accent);
        border-radius: 10px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
      }
      .entry-content { font-size: 14px; color: var(--fg); line-height: 1.5; }
      .entry-time { font-size: 11px; color: var(--fg3); margin-top: 4px; }

      .insight-card {
        background: rgba(129,140,248,0.08); border: 1px solid rgba(129,140,248,0.15);
        border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      }
      .insight-type {
        display: inline-block; font-size: 11px; font-weight: 500;
        background: rgba(129,140,248,0.15); color: var(--accent);
        border-radius: 10px; padding: 2px 10px; margin-bottom: 8px;
      }
      .insight-text { font-size: 14px; line-height: 1.6; color: var(--fg); }

      .empty { text-align: center; padding: 32px 16px; color: var(--fg3); font-size: 14px; }
      .empty-icon { font-size: 32px; margin-bottom: 8px; }
      .msg { font-size: 13px; margin-top: 8px; }
      .msg-ok { color: var(--green); }
      .msg-err { color: var(--red); }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .header-title { font-size: 18px; font-weight: 600; }
      .header-email { font-size: 12px; color: var(--fg3); }
      .header-logout { font-size: 12px; color: var(--fg3); cursor: pointer; }
      .header-logout:hover { color: var(--red); }
      .entry-input-wrap { display: flex; flex-direction: column; gap: 10px; }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <div class="auth">
        <div class="auth-title">🔍 摩擦探测器</div>
        <div class="auth-sub">发现你习惯了的痛点</div>
      </div>
    </div>
    <script>
    (function() {
      const TAG_LABELS = { time: '⏰ 时间', money: '💸 消费', tool: '🔧 工具', habit: '🔄 习惯', other: '💬 其他' };
      const state = window.ResonWidget && ResonWidget.state;
      const app = document.getElementById('app');
      let currentUserId = null;

      // ─── State helpers ─────────────────────────────
      function getState() { return state ? (state.get() || {}) : {}; }
      function getUsers() { return getState().users || {}; }
      function getEntries() { return getState().entries || {}; }
      function getInsights() { return getState().insights || {}; }

      // ─── Auth ──────────────────────────────────────
      function renderAuth() {
        let isLogin = true;
        function draw() {
          app.innerHTML = `
            <div class="auth">
              <div>
                <div class="auth-title">${isLogin ? '登录' : '注册'}</div>
                <div class="auth-sub">生活摩擦探测器</div>
              </div>
              <form class="auth-form" id="auth-form">
                <input type="email" id="auth-email" placeholder="邮箱" required />
                <input type="password" id="auth-pwd" placeholder="密码 (至少6位)" required minlength="6" />
                <button class="btn-primary" type="submit">${isLogin ? '登录' : '注册'}</button>
              </form>
              <div class="auth-toggle" id="auth-toggle">
                ${isLogin ? '没有账号？点此注册' : '已有账号？点此登录'}
              </div>
              <div id="auth-msg" class="msg"></div>
            </div>
          `;
          document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const pwd = document.getElementById('auth-pwd').value;
            const msgEl = document.getElementById('auth-msg');
            msgEl.textContent = '';

            if (!state) {
              msgEl.textContent = '请在 Bloome 中打开此页面';
              msgEl.className = 'msg msg-err';
              return;
            }

            const users = getUsers();

            if (isLogin) {
              // Find user by email
              const found = Object.entries(users).find(([_, u]) => u.email === email);
              if (!found) {
                msgEl.textContent = '账号不存在';
                msgEl.className = 'msg msg-err';
                return;
              }
              const [uid, user] = found;
              if (user.password !== pwd) {
                msgEl.textContent = '密码错误';
                msgEl.className = 'msg msg-err';
                return;
              }
              currentUserId = uid;
              renderMain();
            } else {
              // Check if email exists
              const exists = Object.values(users).some(u => u.email === email);
              if (exists) {
                msgEl.textContent = '邮箱已注册';
                msgEl.className = 'msg msg-err';
                return;
              }
              if (pwd.length < 6) {
                msgEl.textContent = '密码至少6位';
                msgEl.className = 'msg msg-err';
                return;
              }
              // Create user
              const uid = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
              state.set('users.' + uid, { email, password: pwd, createdAt: Date.now() });
              currentUserId = uid;
              renderMain();
            }
          };
          document.getElementById('auth-toggle').onclick = () => { isLogin = !isLogin; draw(); };
        }
        draw();
      }

      // ─── Main app ──────────────────────────────────
      function renderMain() {
        const entries = getEntries();
        const userEntries = Object.entries(entries)
          .filter(([_, e]) => e.userId === currentUserId)
          .sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0))
          .slice(0, 20);

        const users = getUsers();
        const currentUser = users[currentUserId] || {};

        // Compute insights on the fly
        const myEntries = userEntries.map(([_, e]) => e);
        const insights = computeInsights(myEntries);

        // Stats
        const tagCounts = {};
        myEntries.forEach(e => { const t = e.tag || 'other'; tagCounts[t] = (tagCounts[t] || 0) + 1; });
        const topTag = Object.entries(tagCounts).sort((a, b) => b[1] - a[1])[0];

        app.innerHTML = `
          <div class="header">
            <div>
              <div class="header-title">🔍 摩擦探测器</div>
              <div class="header-email">${escHtml(currentUser.email || '')}</div>
            </div>
            <div class="header-logout" id="logout">退出</div>
          </div>

          <div class="stats">
            <div class="stat-card">
              <div class="stat-val">${myEntries.length}</div>
              <div class="stat-label">总记录</div>
            </div>
            <div class="stat-card">
              <div class="stat-val">${topTag ? TAG_LABELS[topTag[0]].split(' ')[0] : '—'}</div>
              <div class="stat-label">最多类型</div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">✏️ 记录一条摩擦</div>
            <div class="entry-input-wrap">
              <textarea class="entry-text" id="entry-text" placeholder="今天什么事让你觉得「算了就这样吧」？" rows="2"></textarea>
              <div class="tag-row" id="tag-row">
                ${Object.entries(TAG_LABELS).map(([k, v]) =>
                  `<button class="tag-btn${k === 'other' ? ' active' : ''}" data-tag="${k}">${v}</button>`
                ).join('')}
              </div>
              <button class="btn-primary" id="submit-entry" style="width:auto; align-self:flex-end;">记录</button>
            </div>
            <div id="entry-msg" class="msg"></div>
          </div>

          <div class="section">
            <div class="section-title">💡 AI 洞察</div>
            ${myEntries.length < 3
              ? `<div class="empty"><div class="empty-icon">📊</div>再记录 ${3 - myEntries.length} 条就能看到洞察</div>`
              : insights.map(i => `
                <div class="insight-card">
                  <span class="insight-type">${typeLabel(i.type)}</span>
                  <div class="insight-text">${i.content}</div>
                </div>
              `).join('')}
          </div>

          <div class="section">
            <div class="section-title">📋 最近记录</div>
            ${userEntries.length === 0
              ? '<div class="empty"><div class="empty-icon">✨</div>还没有记录，开始你的第一条吧</div>'
              : `<div class="entry-list">
                ${userEntries.map(([_, e]) => `
                  <div class="entry-item">
                    <span class="entry-tag">${TAG_LABELS[e.tag] || '💬 其他'}</span>
                    <div>
                      <div class="entry-content">${escHtml(e.content)}</div>
                      <div class="entry-time">${timeAgo(e.createdAt)}</div>
                    </div>
                  </div>
                `).join('')}
              </div>`}
          </div>
        `;

        // Tag selection
        let selectedTag = 'other';
        document.querySelectorAll('.tag-btn').forEach(btn => {
          btn.onclick = () => {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedTag = btn.dataset.tag;
          };
        });

        // Submit entry
        document.getElementById('submit-entry').onclick = () => {
          const text = document.getElementById('entry-text').value.trim();
          const msgEl = document.getElementById('entry-msg');
          if (!text) { msgEl.textContent = '写点什么吧'; msgEl.className = 'msg msg-err'; return; }
          if (!state) { msgEl.textContent = '状态不可用'; msgEl.className = 'msg msg-err'; return; }
          const entryId = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
          state.set('entries.' + entryId, {
            userId: currentUserId,
            content: text,
            tag: selectedTag,
            createdAt: Date.now()
          });
          renderMain();
        };

        // Logout
        document.getElementById('logout').onclick = () => {
          currentUserId = null;
          renderAuth();
        };
      }

      // ─── Client-side rule engine ───────────────────
      function computeInsights(entries) {
        if (entries.length < 3) return [];
        const result = [];

        // Frequency
        const span = entries.length > 1
          ? (entries[0].createdAt - entries[entries.length - 1].createdAt) / (24*60*60*1000)
          : 1;
        const pace = (entries.length / Math.max(span, 1)).toFixed(1);
        result.push({ type: 'frequency', content: `你已经记录了 ${entries.length} 条摩擦，平均每天 ${pace} 条。` });

        // Pattern
        const tagCounts = {};
        entries.forEach(e => { const t = e.tag || 'other'; tagCounts[t] = (tagCounts[t] || 0) + 1; });
        const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
        if (sorted.length > 0) {
          const labels = { time: '时间浪费', money: '隐性消费', tool: '工具不顺手', habit: '不良习惯', other: '其他摩擦' };
          const [top, cnt] = sorted[0];
          const pct = Math.round((cnt / entries.length) * 100);
          result.push({ type: 'pattern', content: `你 ${pct}% 的摩擦跟「${labels[top] || top}」有关。` });
        }

        // Suggestion
        if (sorted.length > 0) {
          const suggestions = {
            time: '试试番茄工作法或时间块——把「算了」的时间段切出来，专门处理。',
            money: '记一周账，重点标记「顺手买」和「忘了关」的订阅。',
            tool: '花 10 分钟搜一下你最常用的工具有没有更快的替代方案。',
            habit: '选一个最小的「算了」场景，连续 7 天用不同方式应对，观察变化。',
            other: '下次遇到「算了」的瞬间，花 5 秒写下：如果不受限，我理想的做法是什么？'
          };
          result.push({ type: 'suggestion', content: suggestions[sorted[0][0]] || suggestions.other });
        }

        // Streak
        const daySet = new Set(entries.map(e => new Date(e.createdAt).toISOString().slice(0, 10)));
        let streak = 0;
        const today = new Date();
        for (let i = 0; i < 30; i++) {
          const d = new Date(today); d.setDate(d.getDate() - i);
          if (daySet.has(d.toISOString().slice(0, 10))) streak++; else break;
        }
        if (streak >= 3) result.push({ type: 'streak', content: `连续 ${streak} 天记录，坚持得很好。` });

        return result;
      }

      // ─── Helpers ───────────────────────────────────
      function typeLabel(t) {
        return { frequency: '📈 频率', pattern: '🔍 模式', suggestion: '💡 建议', streak: '🔥 连续' }[t] || t;
      }
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function timeAgo(ts) {
        const d = Date.now() - ts;
        if (d < 60000) return '刚刚';
        if (d < 3600000) return Math.floor(d/60000) + ' 分钟前';
        if (d < 86400000) return Math.floor(d/3600000) + ' 小时前';
        return Math.floor(d/86400000) + ' 天前';
      }

      // ─── Init ──────────────────────────────────────
      if (state) {
        state.on('change', () => {
          if (currentUserId) renderMain();
        });
      }
      renderAuth();
    })();
    </script>
  </body>
</html>
