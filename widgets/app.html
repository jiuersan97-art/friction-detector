<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>生活摩擦探测器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
        --fg: #f1f5f9; --fg2: #94a3b8; --fg3: #64748b;
        --accent: #818cf8; --accent2: #6366f1;
        --green: #4ade80; --red: #f87171;
        --radius: 12px; --radius-sm: 8px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; }
      .app { max-width: 480px; margin: 0 auto; padding: 16px; }

      .auth { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; }
      .auth-title { font-size: 24px; font-weight: 700; text-align: center; }
      .auth-sub { font-size: 14px; color: var(--fg2); text-align: center; }
      .auth-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
      .auth-toggle { font-size: 13px; color: var(--fg3); text-align: center; cursor: pointer; }
      .auth-toggle:hover { color: var(--accent); }

      input[type="email"], input[type="password"], input[type="text"] {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
        padding: 12px 16px; color: var(--fg); font-size: 15px; width: 100%; outline: none;
        transition: border-color 0.2s; font-family: inherit;
      }
      input:focus { border-color: var(--accent); }
      input::placeholder { color: var(--fg3); }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: white; border: none; border-radius: var(--radius);
        padding: 12px 24px; font-size: 15px; font-weight: 600;
        cursor: pointer; width: 100%; font-family: inherit; transition: opacity 0.2s;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-primary:disabled { opacity: 0.5; cursor: default; }

      .entry-text {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
        padding: 14px 16px; color: var(--fg); font-size: 15px; width: 100%; outline: none;
        resize: none; min-height: 60px; font-family: inherit; transition: border-color 0.2s;
      }
      .entry-text:focus { border-color: var(--accent); }
      .entry-text::placeholder { color: var(--fg3); }
      .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .tag-btn {
        background: var(--bg2); border: 1px solid var(--bg3); border-radius: 20px;
        padding: 6px 14px; font-size: 13px; color: var(--fg2); cursor: pointer;
        transition: all 0.2s; font-family: inherit;
      }
      .tag-btn:hover { border-color: var(--accent); color: var(--fg); }
      .tag-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

      .stats { display: flex; gap: 12px; margin-bottom: 16px; }
      .stat-card { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 14px; text-align: center; }
      .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
      .stat-label { font-size: 12px; color: var(--fg3); margin-top: 4px; }

      .section { margin-bottom: 20px; }
      .section-title { font-size: 14px; font-weight: 600; color: var(--fg2); margin-bottom: 10px; }

      .entry-list { display: flex; flex-direction: column; gap: 8px; }
      .entry-item {
        background: var(--bg2); border-radius: var(--radius-sm);
        padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
      }
      .entry-tag {
        font-size: 11px; background: rgba(129,140,248,0.15); color: var(--accent);
        border-radius: 10px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
      }
      .entry-content { font-size: 14px; color: var(--fg); line-height: 1.5; }
      .entry-time { font-size: 11px; color: var(--fg3); margin-top: 4px; }

      .insight-card {
        background: rgba(129,140,248,0.08); border: 1px solid rgba(129,140,248,0.15);
        border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      }
      .insight-type {
        display: inline-block; font-size: 11px; font-weight: 500;
        background: rgba(129,140,248,0.15); color: var(--accent);
        border-radius: 10px; padding: 2px 10px; margin-bottom: 8px;
      }
      .insight-text { font-size: 14px; line-height: 1.6; color: var(--fg); }

      .empty { text-align: center; padding: 32px 16px; color: var(--fg3); font-size: 14px; }
      .empty-icon { font-size: 32px; margin-bottom: 8px; }
      .msg { font-size: 13px; margin-top: 8px; }
      .msg-ok { color: var(--green); }
      .msg-err { color: var(--red); }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .header-title { font-size: 18px; font-weight: 600; }
      .header-email { font-size: 12px; color: var(--fg3); }
      .header-logout { font-size: 12px; color: var(--fg3); cursor: pointer; }
      .header-logout:hover { color: var(--red); }
      .entry-input-wrap { display: flex; flex-direction: column; gap: 10px; }

      .iframe-banner {
        background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.2);
        border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
        text-align: center; font-size: 13px; color: var(--fg2);
      }
      .iframe-banner a {
        color: var(--accent); text-decoration: underline; cursor: pointer;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 16px; height: 16px; border: 2px solid rgba(129,140,248,0.3);
        border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
        display: inline-block; vertical-align: middle; margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app" class="app">
      <div class="auth">
        <div class="auth-title">🔍 摩擦探测器</div>
        <div class="auth-sub">加载中...</div>
      </div>
    </div>
    <script>
    (function() {
      const API_BASE = 'https://fast-escargot-5192.youware.pro';
      const AGNES_KEY = 'sk-SQFmWrmk32XJWZlTUEPO6x63AsCRo4zIRzWmbGwu84jdKp3y';
      const AGNES_URL = 'https://apihub.agnes-ai.com/v1/chat/completions';
      const TAG_LABELS = { time: '⏰ 时间', money: '💸 消费', tool: '🔧 工具', habit: '🔄 习惯', other: '💬 其他' };

      const app = document.getElementById('app');
      let token = localStorage.getItem('friction_token');
      let currentUserEmail = localStorage.getItem('friction_email') || '';

      // Detect iframe
      const inIframe = window.self !== window.top;

      // ─── API helper ────────────────────────────────
      async function api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const res = await fetch(API_BASE + path, { ...opts, headers: { ...headers, ...opts.headers } });
        return res.json();
      }

      // ─── AI Analysis ───────────────────────────────
      async function aiAnalyze(content, tag) {
        const tagLabels = { time: '时间浪费', money: '隐性消费', tool: '工具不顺手', habit: '不良习惯', other: '其他摩擦' };
        const prompt = `你是一个生活摩擦分析助手。用户记录了一条日常摩擦：

内容："${content}"
类型：${tagLabels[tag] || '其他'}

请用中文回复，格式如下（不要加其他内容）：

📋 分析
[一句话说明这个摩擦的根因]

💡 具体方案
[针对这个具体场景的1-2句可操作建议，要具体到步骤，不要泛泛而谈]`;
        try {
          const res = await fetch(AGNES_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AGNES_KEY },
            body: JSON.stringify({ model: 'agnes-2.0-flash', messages: [{ role: 'user', content: prompt }], max_tokens: 200, temperature: 0.7 })
          });
          const data = await res.json();
          const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
          const whyMatch = text.match(/📋\s*分析\s*\n([\s\S]*?)(?=💡|$)/);
          const howMatch = text.match(/💡\s*具体方案\s*\n([\s\S]*?)$/);
          return { why: whyMatch?.[1]?.trim() || '这个摩擦反映了你的某个未被优化的日常环节', how: howMatch?.[1]?.trim() || '试着记录更多细节，找到具体的改善点' };
        } catch (e) { return null; }
      }

      // ─── Auth ──────────────────────────────────────
      function renderAuth() {
        let isLogin = true;
        function draw() {
          const iframeMsg = inIframe ? `<div class="iframe-banner">在 iframe 中部分功能受限，<a id="open-new-tab">在新窗口打开</a> 获得完整体验</div>` : '';
          app.innerHTML = `
            ${iframeMsg}
            <div class="auth">
              <div>
                <div class="auth-title">${isLogin ? '登录' : '注册'}</div>
                <div class="auth-sub">生活摩擦探测器</div>
              </div>
              <form class="auth-form" id="auth-form">
                <input type="email" id="auth-email" placeholder="邮箱" required />
                <input type="password" id="auth-pwd" placeholder="密码 (至少6位)" required minlength="6" />
                <button class="btn-primary" type="submit">${isLogin ? '登录' : '注册'}</button>
              </form>
              <div class="auth-toggle" id="auth-toggle">${isLogin ? '没有账号？点此注册' : '已有账号？点此登录'}</div>
              <div id="auth-msg" class="msg"></div>
            </div>`;
          if (inIframe) document.getElementById('open-new-tab').onclick = () => window.open(window.location.href, '_blank');
          document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const pwd = document.getElementById('auth-pwd').value;
            const msgEl = document.getElementById('auth-msg');
            const endpoint = isLogin ? '/api/public/login' : '/api/public/signup';
            try {
              const data = await api(endpoint, { method: 'POST', body: JSON.stringify({ email, password: pwd }) });
              if (data.ok) {
                token = data.token; currentUserEmail = email;
                localStorage.setItem('friction_token', token);
                localStorage.setItem('friction_email', email);
                renderMain();
              } else { msgEl.textContent = data.error || '失败'; msgEl.className = 'msg msg-err'; }
            } catch (err) { msgEl.textContent = '网络错误，请在新窗口中打开'; msgEl.className = 'msg msg-err'; }
          };
          document.getElementById('auth-toggle').onclick = () => { isLogin = !isLogin; draw(); };
        }
        draw();
      }

      // ─── Main app ──────────────────────────────────
      async function renderMain() {
        app.innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg3);">加载中...</div>';

        let entries = [], insightsList = [], insightMsg = '';
        try {
          const [entriesRes, insightsRes] = await Promise.all([
            api('/api/public/entries?limit=20').catch(() => ({ ok: false })),
            api('/api/public/insights').catch(() => ({ ok: false }))
          ]);
          entries = entriesRes.ok ? (entriesRes.entries || []) : [];
          insightsList = insightsRes.ok ? (insightsRes.insights || []) : [];
          insightMsg = insightsRes.message || '';
        } catch (e) { renderAuth(); return; }

        const tagCounts = {};
        entries.forEach(e => { const t = e.tag || 'other'; tagCounts[t] = (tagCounts[t] || 0) + 1; });
        const topTag = Object.entries(tagCounts).sort((a, b) => b[1] - a[1])[0];

        const iframeMsg = inIframe ? `<div class="iframe-banner">在 iframe 中部分功能受限，<a id="open-new-tab-main">在新窗口打开</a></div>` : '';

        app.innerHTML = `
          ${iframeMsg}
          <div class="header">
            <div>
              <div class="header-title">🔍 摩擦探测器</div>
              <div class="header-email">${escHtml(currentUserEmail)}</div>
            </div>
            <div class="header-logout" id="logout">退出</div>
          </div>
          <div class="stats">
            <div class="stat-card"><div class="stat-val">${entries.length}</div><div class="stat-label">总记录</div></div>
            <div class="stat-card"><div class="stat-val">${topTag ? TAG_LABELS[topTag[0]].split(' ')[0] : '—'}</div><div class="stat-label">最多类型</div></div>
          </div>
          <div class="section">
            <div class="section-title">✏️ 记录一条摩擦</div>
            <div class="entry-input-wrap">
              <textarea class="entry-text" id="entry-text" placeholder="今天什么事让你觉得「算了就这样吧」？" rows="2"></textarea>
              <div class="tag-row" id="tag-row">
                ${Object.entries(TAG_LABELS).map(([k, v]) => `<button class="tag-btn${k === 'other' ? ' active' : ''}" data-tag="${k}">${v}</button>`).join('')}
              </div>
              <button class="btn-primary" id="submit-entry" style="width:auto;align-self:flex-end;">记录</button>
            </div>
            <div id="entry-msg" class="msg"></div>
            <div id="ai-result"></div>
          </div>
          <div class="section">
            <div class="section-title">💡 AI 洞察</div>
            ${insightsList.length === 0 ? `<div class="empty">${insightMsg || '<div class="empty-icon">📊</div>记录 3 条后就能看到洞察'}</div>` : ''}
            ${insightsList.map(i => `<div class="insight-card"><span class="insight-type">${typeLabel(i.type)}</span><div class="insight-text">${escHtml(i.content)}</div></div>`).join('')}
          </div>
          <div class="section">
            <div class="section-title">📋 最近记录</div>
            ${entries.length === 0 ? '<div class="empty"><div class="empty-icon">✨</div>还没有记录，开始你的第一条吧</div>' : ''}
            <div class="entry-list">
              ${entries.map(e => `<div class="entry-item"><span class="entry-tag">${TAG_LABELS[e.tag] || '💬 其他'}</span><div><div class="entry-content">${escHtml(e.content)}</div><div class="entry-time">${timeAgo(e.createdAt)}</div></div></div>`).join('')}
            </div>
          </div>`;

        if (inIframe) { const el = document.getElementById('open-new-tab-main'); if (el) el.onclick = () => window.open(window.location.href, '_blank'); }

        let selectedTag = 'other';
        document.querySelectorAll('.tag-btn').forEach(btn => {
          btn.onclick = () => { document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedTag = btn.dataset.tag; };
        });

        document.getElementById('submit-entry').onclick = async () => {
          const text = document.getElementById('entry-text').value.trim();
          const msgEl = document.getElementById('entry-msg');
          const resultEl = document.getElementById('ai-result');
          if (!text) { msgEl.textContent = '写点什么吧'; msgEl.className = 'msg msg-err'; return; }

          const btn = document.getElementById('submit-entry');
          btn.disabled = true; btn.textContent = '🤖 分析中...'; btn.style.opacity = '0.7';

          try {
            const res = await api('/api/public/entries', { method: 'POST', body: JSON.stringify({ content: text, tag: selectedTag }) });
            if (!res.ok) { msgEl.textContent = res.error || '提交失败'; msgEl.className = 'msg msg-err'; btn.disabled = false; btn.textContent = '记录'; btn.style.opacity = '1'; return; }
          } catch (e) { msgEl.textContent = '网络错误'; msgEl.className = 'msg msg-err'; btn.disabled = false; btn.textContent = '记录'; btn.style.opacity = '1'; return; }

          // Show loading
          resultEl.innerHTML = '<div style="background:rgba(129,140,248,0.08);border:1px solid rgba(129,140,248,0.15);border-radius:10px;padding:14px;margin-top:10px;"><span class="spinner"></span><span style="font-size:13px;color:var(--accent);">AI 正在分析你的记录...</span></div>';
          document.getElementById('entry-text').value = '';

          const suggestion = await aiAnalyze(text, selectedTag);
          if (suggestion) {
            resultEl.innerHTML = `<div style="background:rgba(129,140,248,0.08);border:1px solid rgba(129,140,248,0.15);border-radius:10px;padding:14px;margin-top:10px;">
              <div style="font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;">📋 分析</div>
              <div style="font-size:13px;color:var(--fg2);margin-bottom:10px;">${escHtml(suggestion.why)}</div>
              <div style="font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;">💡 具体方案</div>
              <div style="font-size:13px;color:var(--fg);line-height:1.6;">${escHtml(suggestion.how)}</div>
            </div>`;
          } else {
            resultEl.innerHTML = '';
          }

          btn.disabled = false; btn.textContent = '记录'; btn.style.opacity = '1';
          // Refresh entries list
          try {
            const entriesRes = await api('/api/public/entries?limit=20');
            if (entriesRes.ok) renderMain();
          } catch (e) {}
        };

        document.getElementById('logout').onclick = () => {
          token = null; currentUserEmail = null;
          localStorage.removeItem('friction_token');
          localStorage.removeItem('friction_email');
          renderAuth();
        };
      }

      // ─── Helpers ───────────────────────────────────
      function typeLabel(t) { return { frequency: '📈 频率', pattern: '🔍 模式', suggestion: '💡 建议', streak: '🔥 连续' }[t] || t; }
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function timeAgo(ts) {
        const d = Date.now() - ts;
        if (d < 60000) return '刚刚';
        if (d < 3600000) return Math.floor(d/60000) + ' 分钟前';
        if (d < 86400000) return Math.floor(d/3600000) + ' 小时前';
        return Math.floor(d/86400000) + ' 天前';
      }

      // ─── Init ──────────────────────────────────────
      if (token) {
        // Verify token is still valid
        api('/api/public/entries?limit=1').then(res => {
          if (res.ok) renderMain();
          else { token = null; localStorage.removeItem('friction_token'); renderAuth(); }
        }).catch(() => renderAuth());
      } else {
        renderAuth();
      }
    })();
    </script>
  </body>
</html>
